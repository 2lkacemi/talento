spring.application.name=talento-backend

# Database
spring.datasource.url=jdbc:postgresql://localhost:5432/talento_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Server
server.port=8080

# JWT
app.jwt.secret=talento-super-secret-key-change-in-production-must-be-at-least-512-bits-long-key-here
app.jwt.expiration-ms=86400000

# File upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# CORS
app.cors.allowed-origins=http://localhost:3000
